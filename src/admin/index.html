<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pines — Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f4f5f7; color: #1a1a1a; line-height: 1.6; }

        .topbar { background: #2d3e2d; color: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .topbar h1 { font-size: 1.2rem; font-weight: 700; }
        .topbar .status { font-size: 0.85rem; opacity: 0.7; }

        .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }

        label { display: block; font-size: 0.85rem; font-weight: 600; color: #444; margin-bottom: 0.3rem; }
        input[type="text"] {
            width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #d0d0d0; border-radius: 6px;
            font-size: 0.95rem; font-family: inherit; transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #5a7a5a; }
        .field { margin-bottom: 1rem; }

        .btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.6rem 1.25rem; border: none; border-radius: 6px;
            font-size: 0.9rem; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: #5a7a5a; color: #fff; }
        .btn-primary:hover { background: #4a684a; }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-danger:hover { background: #a93226; }
        .btn-sm { padding: 0.4rem 0.75rem; font-size: 0.8rem; }

        .card { background: #fff; border-radius: 8px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 1.5rem; }
        .card h2 { font-size: 1.1rem; color: #2d3e2d; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }

        .special-row { display: flex; gap: 0.75rem; align-items: flex-start; padding: 0.75rem; background: #fafafa; border: 1px solid #eee; border-radius: 6px; margin-bottom: 0.5rem; }
        .special-row .fields { flex: 1; display: grid; grid-template-columns: 1fr 80px; gap: 0.5rem; }
        .special-row .fields .desc-field { grid-column: 1 / -1; }
        .special-row input { padding: 0.5rem 0.6rem; font-size: 0.9rem; }
        .special-row .remove-btn { flex-shrink: 0; margin-top: 0.25rem; }

        .empty-state { text-align: center; padding: 2rem; color: #999; font-size: 0.95rem; }

        .toast {
            position: fixed; bottom: 2rem; right: 2rem; padding: 0.75rem 1.25rem;
            border-radius: 8px; font-size: 0.9rem; font-weight: 500;
            color: #fff; opacity: 0; transform: translateY(10px);
            transition: all 0.3s; pointer-events: none; z-index: 100;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: #27ae60; }
        .toast.error { background: #c0392b; }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .special-row .fields { grid-template-columns: 1fr; }
            .topbar { padding: 0.75rem 1rem; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <h1>The Pines — Dashboard</h1>
    <span class="status" id="connectionStatus">Loading...</span>
</div>

<div class="container">
    <div class="card">
        <h2>
            Daily Specials
            <button class="btn btn-primary btn-sm" onclick="addSpecial()">+ Add Item</button>
        </h2>
        <div class="field">
            <label for="specialsTitle">Banner Title</label>
            <input type="text" id="specialsTitle" value="Today's Specials" oninput="updatePreview()">
        </div>
        <div id="specialsList"></div>
        <div style="margin-top:1rem; display:flex; gap:0.75rem; flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="publish()">Publish to Website</button>
            <button class="btn btn-danger" onclick="clearAll()">Clear All Specials</button>
        </div>
    </div>

    <div class="card">
        <h2>Live Preview</h2>
        <div id="previewContent" style="background:#2d3e2d; color:#fff; padding:1.5rem; border-radius:6px; text-align:center;"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SUPABASE_URL = 'https://abinctitorpdfvtifkca.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFiaW5jdGl0b3JwZGZ2dGlma2NhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDY0NzAsImV4cCI6MjA4ODM4MjQ3MH0.CY5UxQCRpRFVeXYo6-GXswX_itTAY1aWGHVIfjfSDGE';

function sbHeaders(write) {
    var h = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };
    if (write) { h['Content-Type'] = 'application/json'; h['Prefer'] = 'return=minimal'; }
    return h;
}

/* --- Load / Save --- */

async function loadSpecials() {
    try {
        var res = await fetch(SUPABASE_URL + '/rest/v1/specials?id=eq.1&select=title,specials', {
            headers: sbHeaders()
        });
        var rows = await res.json();
        var data = rows[0] || { title: "Today's Specials", specials: [] };

        document.getElementById('specialsTitle').value = data.title || "Today's Specials";
        var list = document.getElementById('specialsList');
        list.innerHTML = '';
        if (data.specials && data.specials.length) {
            data.specials.forEach(function(item) { addSpecialRow(item); });
        } else {
            list.innerHTML = '<div class="empty-state">No specials set. Click "+ Add Item" to start.</div>';
        }
        updatePreview();
        document.getElementById('connectionStatus').textContent = 'Connected';
        toast('Specials loaded', 'success');
    } catch(e) {
        document.getElementById('connectionStatus').textContent = 'Connection error';
        toast('Failed to load: ' + e.message, 'error');
    }
}

async function publish() {
    var data = gatherData();
    try {
        var res = await fetch(SUPABASE_URL + '/rest/v1/specials?id=eq.1', {
            method: 'PATCH',
            headers: sbHeaders(true),
            body: JSON.stringify({ title: data.title, specials: data.specials, updated_at: new Date().toISOString() })
        });
        if (!res.ok) {
            var err = await res.json();
            throw new Error(err.message || 'Update failed');
        }
        toast('Published! Changes are live on the website.', 'success');
    } catch(e) {
        toast('Publish failed: ' + e.message, 'error');
    }
}

/* --- Editor UI --- */

function addSpecial() {
    var list = document.getElementById('specialsList');
    var empty = list.querySelector('.empty-state');
    if (empty) empty.remove();
    addSpecialRow({ name: '', price: '', desc: '' });
}

function addSpecialRow(item) {
    var list = document.getElementById('specialsList');
    var row = document.createElement('div');
    row.className = 'special-row';
    row.innerHTML =
        '<div class="fields">' +
            '<div class="field" style="margin:0"><input type="text" class="s-name" placeholder="Item name" value="' + esc(item.name) + '" oninput="updatePreview()"></div>' +
            '<div class="field" style="margin:0"><input type="text" class="s-price" placeholder="Price" value="' + esc(item.price) + '" oninput="updatePreview()"></div>' +
            '<div class="field desc-field" style="margin:0"><input type="text" class="s-desc" placeholder="Short description" value="' + esc(item.desc) + '" oninput="updatePreview()"></div>' +
        '</div>' +
        '<button class="btn btn-danger btn-sm remove-btn" onclick="removeSpecial(this)">Remove</button>';
    list.appendChild(row);
}

function removeSpecial(btn) {
    btn.closest('.special-row').remove();
    var list = document.getElementById('specialsList');
    if (!list.querySelector('.special-row')) {
        list.innerHTML = '<div class="empty-state">No specials set. Click "+ Add Item" to start.</div>';
    }
    updatePreview();
}

function clearAll() {
    var list = document.getElementById('specialsList');
    list.innerHTML = '<div class="empty-state">No specials set. Click "+ Add Item" to start.</div>';
    updatePreview();
}

function gatherData() {
    var title = document.getElementById('specialsTitle').value.trim() || "Today's Specials";
    var rows = document.querySelectorAll('.special-row');
    var specials = [];
    rows.forEach(function(row) {
        var name = row.querySelector('.s-name').value.trim();
        var price = row.querySelector('.s-price').value.trim();
        var desc = row.querySelector('.s-desc').value.trim();
        if (name) specials.push({ name: name, price: price, desc: desc });
    });
    return { title: title, specials: specials };
}

/* --- Preview --- */

function updatePreview() {
    var data = gatherData();
    var preview = document.getElementById('previewContent');
    if (!data.specials.length) {
        preview.innerHTML = '<p style="opacity:0.5;">No specials — banner will be hidden on the website</p>';
        return;
    }
    var html = '<h3 style="font-size:1.2rem; text-transform:uppercase; letter-spacing:0.04em; margin-bottom:1rem;">' + esc(data.title) + '</h3>';
    html += '<div style="display:flex; justify-content:center; gap:2rem; flex-wrap:wrap;">';
    data.specials.forEach(function(item) {
        html += '<div style="min-width:160px;">';
        html += '<div style="font-weight:700;">' + esc(item.name) + '</div>';
        if (item.price) html += '<div style="color:#a5c49a; font-weight:700;">$' + esc(item.price) + '</div>';
        if (item.desc) html += '<div style="font-size:0.85rem; opacity:0.75;">' + esc(item.desc) + '</div>';
        html += '</div>';
    });
    html += '</div>';
    preview.innerHTML = html;
}

/* --- Utilities --- */

function esc(str) {
    if (!str) return '';
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML.replace(/"/g, '&quot;');
}

function toast(msg, type) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast ' + type + ' show';
    clearTimeout(el._timeout);
    el._timeout = setTimeout(function() { el.classList.remove('show'); }, 3000);
}

loadSpecials();
</script>
</body>
</html>
